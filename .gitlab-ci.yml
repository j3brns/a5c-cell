# .gitlab-ci.yml — Platform CI/CD Pipeline
#
# Stages: validate → test → plan → deploy-dev → deploy-staging → deploy-prod
#
# Implements TASK-044.
# ADRs: ADR-007

stages:
  - validate
  - test
  - plan
  - deploy-dev
  - deploy-staging
  - deploy-prod

workflow:
  rules:
    # GitLab CI is paused by default while repository development uses local
    # validation through MR creation. Set GITLAB_PIPELINES_ENABLED=1 to re-enable
    # branch/MR pipelines without changing this file.
    - if: $GITLAB_PIPELINES_ENABLED == "1" && $CI_PIPELINE_SOURCE == "merge_request_event"
    # Avoid paying for both a branch pipeline and an MR pipeline for the same commit
    # when CI is explicitly re-enabled.
    - if: $GITLAB_PIPELINES_ENABLED == "1" && $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $GITLAB_PIPELINES_ENABLED == "1" && $CI_COMMIT_BRANCH
    - when: never

variables:
  AWS_REGION: "eu-west-2"
  GITLAB_PIPELINES_ENABLED: "0"
  UV_LINK_MODE: "copy"
  CANARY_POLICY_DEV: "all-at-once"
  CANARY_POLICY_STAGING: "canary-10%-30m"
  CANARY_POLICY_PROD: "canary-10%-15m"
  STAGING_ROLLOUT_WINDOW_MINUTES: "30"
  PROD_ROLLOUT_WINDOW_MINUTES: "15"
  GITLAB_PROTECTED_ENVIRONMENT_NAME: "prod"
  GITLAB_PROTECTED_ENV_REQUIRED_APPROVALS: "2"
  # Canonical role variables (set in GitLab CI/CD variables):
  # PLATFORM_PIPELINE_VALIDATE_ROLE_ARN
  # PLATFORM_PIPELINE_DEPLOY_DEV_ROLE_ARN
  # PLATFORM_PIPELINE_DEPLOY_STAGING_ROLE_ARN
  # PLATFORM_PIPELINE_DEPLOY_PROD_ROLE_ARN
  # APPCONFIG_EXTENSION_LAYER_ARN
  # Legacy fallback variables are still supported in jobs:
  # AWS_ROLE_ARN_VALIDATE, AWS_ROLE_ARN_DEPLOY_DEV, AWS_ROLE_ARN_DEPLOY_STAGING, AWS_ROLE_ARN_DEPLOY_PROD

default:
  image: python:3.12
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com

.tools_base:
  before_script:
    - |
      if command -v apt-get >/dev/null 2>&1 && [ "$(id -u)" -eq 0 ]; then
        apt-get update && apt-get install -y curl nodejs npm unzip jq
      else
        echo "Skipping apt bootstrap (non-privileged runner or apt-get unavailable); using existing/user-space tools."
      fi
    - curl -Ls https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - make ensure-tools
    - |
      export PATH="$HOME/.local/bin:$PATH"
      if ! command -v aws >/dev/null 2>&1; then
        echo "AWS CLI not found; installing user-scoped awscli with uv."
        uv tool install --force awscli
      fi

.aws_auth_base:
  extends: .tools_base
  before_script:
    - !reference [.tools_base, before_script]
    - |
      if [ -z "${AWS_ROLE_ARN:-}" ]; then
        if [ -n "${AWS_ROLE_ARN_PRIMARY:-}" ]; then
          export AWS_ROLE_ARN="${AWS_ROLE_ARN_PRIMARY}"
        elif [ -n "${AWS_ROLE_ARN_FALLBACK:-}" ]; then
          export AWS_ROLE_ARN="${AWS_ROLE_ARN_FALLBACK}"
        fi
      fi
      if [ -z "${AWS_ROLE_ARN:-}" ]; then
        echo "ERROR: AWS role ARN not set."
        echo "Set canonical PLATFORM_PIPELINE_*_ROLE_ARN variables (preferred)."
        exit 1
      fi
      if [ -z "${GITLAB_OIDC_TOKEN:-}" ]; then
        echo "ERROR: GITLAB_OIDC_TOKEN not issued for this job."
        echo "Ensure the job inherits default id_tokens syntax."
        exit 1
      fi
    - |
      KST=($(aws sts assume-role-with-web-identity \
        --role-arn ${AWS_ROLE_ARN} \
        --role-session-name "GitLabCI-${CI_JOB_ID}" \
        --web-identity-token ${GITLAB_OIDC_TOKEN} \
        --query "Credentials.[AccessKeyId,SecretAccessKey,SessionToken]" \
        --output text))
      if [ -z "${KST[0]}" ]; then echo "ERROR: STS AssumeRole failed"; exit 1; fi
      export AWS_ACCESS_KEY_ID=${KST[0]}
      export AWS_SECRET_ACCESS_KEY=${KST[1]}
      export AWS_SESSION_TOKEN=${KST[2]}
      export AWS_DEFAULT_REGION=${AWS_REGION}
      export AWS_REGION=${AWS_REGION}

.test_job_base:
  stage: test
  extends: .tools_base
  interruptible: true

.deploy_job_base:
  extends: .aws_auth_base
  before_script:
    - !reference [.aws_auth_base, before_script]
    - |
      if [ -z "${APPCONFIG_EXTENSION_LAYER_ARN:-}" ]; then
        echo "ERROR: APPCONFIG_EXTENSION_LAYER_ARN must be set to the current AWS AppConfig ARM64 Lambda extension layer ARN."
        exit 1
      fi
  allow_failure: false
  rules:
    - !reference [.main_deployable_change_rules, rules]

.platform_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: &platform_changes
        - .gitlab-ci.yml
        - .secrets.baseline
        - .spectral.yaml
        - Makefile
        - docker-compose.yml
        - pyproject.toml
        - pyrightconfig.json
        - uv.lock
        - agents/**/*
        - gateway/**/*
        - infra/**/*
        - scripts/**/*
        - spa/**/*
        - src/**/*
        - tests/**/*
        - docs/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *platform_changes
    - if: $CI_COMMIT_BRANCH
      changes: *platform_changes

.python_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: &python_changes
        - .gitlab-ci.yml
        - .secrets.baseline
        - Makefile
        - pyproject.toml
        - pyrightconfig.json
        - uv.lock
        - agents/**/*.py
        - gateway/**/*
        - scripts/**/*.py
        - src/**/*
        - tests/**/*
        - docs/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *python_changes
    - if: $CI_COMMIT_BRANCH
      changes: *python_changes

.cdk_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: &cdk_changes
        - .gitlab-ci.yml
        - Makefile
        - infra/**/*
        - src/**/*
        - agents/**/*
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *cdk_changes
    - if: $CI_COMMIT_BRANCH
      changes: *cdk_changes

.spa_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: &spa_changes
        - .gitlab-ci.yml
        - Makefile
        - spa/**/*
        - src/bff/**/*
        - docs/openapi.yaml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *spa_changes
    - if: $CI_COMMIT_BRANCH
      changes: *spa_changes

.deployable_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: &deployable_changes
        - .gitlab-ci.yml
        - Makefile
        - agents/**/*
        - gateway/**/*
        - infra/**/*
        - scripts/deploy_frontend.py
        - scripts/bootstrap.py
        - scripts/register_agent.py
        - spa/**/*
        - src/**/*
        - docs/openapi.yaml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *deployable_changes
    - if: $CI_COMMIT_BRANCH
      changes: *deployable_changes

.main_deployable_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *deployable_changes

.main_agent_pipeline_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: &agent_pipeline_changes
        - .gitlab-ci.yml
        - agents/.gitlab-ci-agent.yml
        - agents/**/*

.agent_pipeline_change_rules:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *agent_pipeline_changes
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *agent_pipeline_changes
    - if: $CI_COMMIT_BRANCH
      changes: *agent_pipeline_changes

# --- VALIDATE STAGE ---

validate:
  stage: validate
  extends: .tools_base
  script:
    - make generated-state-audit
    - make docs-sync-audit
    - make validate-python
    - make validate-cdk
    - make validate-secrets-full
  interruptible: true
  rules:
    - !reference [.platform_change_rules, rules]

validate-pipeline-policy:
  stage: validate
  extends: .tools_base
  script:
    - >
      PYTHONPATH=. uv run pytest
      tests/unit/test_issue_110_ci_policy.py
      tests/unit/test_check_gitlab_protected_environment.py
      -v --tb=short
  interruptible: true

# --- TEST STAGE ---

test-unit:
  extends: .test_job_base
  script:
    - make test-unit PYTEST_ARGS="--junitxml=junit-report.xml -n auto --dist loadfile"
  rules:
    - !reference [.python_change_rules, rules]
  artifacts:
    when: always
    reports:
      junit: junit-report.xml

test-integration:
  extends: .aws_auth_base
  stage: test
  variables:
    AWS_ROLE_ARN_PRIMARY: ${PLATFORM_PIPELINE_VALIDATE_ROLE_ARN}
    AWS_ROLE_ARN_FALLBACK: ${AWS_ROLE_ARN_VALIDATE}
  script:
    - make test-int
  rules:
    - !reference [.python_change_rules, rules]

test-cdk:
  extends: .test_job_base
  script:
    - cd infra/cdk && npm test -- --runInBand
  rules:
    - !reference [.cdk_change_rules, rules]

test-spa:
  extends: .test_job_base
  script:
    - cd spa
    - npm ci
    - npm test
  rules:
    - !reference [.spa_change_rules, rules]
  artifacts:
    when: always
    paths:
      - spa/coverage/

validate-agent-pipelines:
  stage: test
  trigger:
    include:
      - local: agents/.gitlab-ci-agent.yml
    strategy: mirror
  parallel:
    matrix:
      - AGENT_NAME: ["echo-agent", "platform-diagnostics"]
        AGENT_PIPELINE_MODE: ["validate"]
  allow_failure: false
  rules:
    - !reference [.agent_pipeline_change_rules, rules]

# --- PLAN STAGE ---

plan-infra:
  stage: plan
  extends: .aws_auth_base
  variables:
    AWS_ROLE_ARN_PRIMARY: ${PLATFORM_PIPELINE_VALIDATE_ROLE_ARN}
    AWS_ROLE_ARN_FALLBACK: ${AWS_ROLE_ARN_VALIDATE}
  script:
    - make infra-diff ENV=dev > dev-diff.txt
    - make infra-diff ENV=staging > staging-diff.txt
    - make infra-diff ENV=prod > prod-diff.txt
  artifacts:
    paths:
      - dev-diff.txt
      - staging-diff.txt
      - prod-diff.txt
  rules:
    - !reference [.deployable_change_rules, rules]

# --- DEPLOY DEV ---

deploy-agent-pipelines:
  stage: deploy-dev
  trigger:
    include:
      - local: agents/.gitlab-ci-agent.yml
    strategy: mirror
  parallel:
    matrix:
      - AGENT_NAME: ["echo-agent", "platform-diagnostics"]
        AGENT_PIPELINE_MODE: ["deploy-dev"]
  allow_failure: false
  rules:
    - !reference [.main_agent_pipeline_change_rules, rules]

promote-agent-staging:
  stage: deploy-staging
  trigger:
    include:
      - local: agents/.gitlab-ci-agent.yml
    strategy: mirror
  parallel:
    matrix:
      - AGENT_NAME: ["echo-agent", "platform-diagnostics"]
        AGENT_PIPELINE_MODE: ["promote-staging"]
  allow_failure: false
  rules:
    - !reference [.main_agent_pipeline_change_rules, rules]

promote-agent-prod:
  stage: deploy-prod
  needs: ["promote-agent-staging"]
  trigger:
    include:
      - local: agents/.gitlab-ci-agent.yml
    strategy: mirror
  parallel:
    matrix:
      - AGENT_NAME: ["echo-agent", "platform-diagnostics"]
        AGENT_PIPELINE_MODE: ["promote-prod"]
  allow_failure: false
  rules:
    - !reference [.main_agent_pipeline_change_rules, rules]

deploy-dev:
  stage: deploy-dev
  extends: .deploy_job_base
  variables:
    AWS_ROLE_ARN_PRIMARY: ${PLATFORM_PIPELINE_DEPLOY_DEV_ROLE_ARN}
    AWS_ROLE_ARN_FALLBACK: ${AWS_ROLE_ARN_DEPLOY_DEV}
    ENV: dev
  script:
    - |
      echo "Applying canary policy for ${ENV}: ${CANARY_POLICY_DEV}"
      make infra-deploy ENV=dev
      make spa-push ENV=dev
  environment:
    name: dev
    deployment_tier: development

# --- DEPLOY STAGING ---

deploy-staging:
  stage: deploy-staging
  extends: .deploy_job_base
  variables:
    AWS_ROLE_ARN_PRIMARY: ${PLATFORM_PIPELINE_DEPLOY_STAGING_ROLE_ARN}
    AWS_ROLE_ARN_FALLBACK: ${AWS_ROLE_ARN_DEPLOY_STAGING}
    ENV: staging
  script:
    - |
      echo "Applying canary policy for ${ENV}: ${CANARY_POLICY_STAGING}"
      echo "Staging rollout observation window: ${STAGING_ROLLOUT_WINDOW_MINUTES} minutes"
      make infra-deploy ENV=staging
      make spa-push ENV=staging
  environment:
    name: staging
    deployment_tier: staging
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *deployable_changes
      when: manual

staging-rollout-window:
  stage: deploy-staging
  image: alpine:3.21
  needs: ["deploy-staging"]
  script:
    - echo "Staging rollout window complete after ${STAGING_ROLLOUT_WINDOW_MINUTES} minutes."
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *deployable_changes
      when: delayed
      start_in: 30 minutes

# --- DEPLOY PROD ---

deploy-prod:
  stage: deploy-prod
  extends: .deploy_job_base
  needs: ["staging-rollout-window"]
  variables:
    AWS_ROLE_ARN_PRIMARY: ${PLATFORM_PIPELINE_DEPLOY_PROD_ROLE_ARN}
    AWS_ROLE_ARN_FALLBACK: ${AWS_ROLE_ARN_DEPLOY_PROD}
    ENV: prod
  script:
    - |
      uv run python scripts/check_gitlab_protected_environment.py \
        --environment "${GITLAB_PROTECTED_ENVIRONMENT_NAME}" \
        --min-approvals "${GITLAB_PROTECTED_ENV_REQUIRED_APPROVALS}"
      echo "Applying canary policy for ${ENV}: ${CANARY_POLICY_PROD}"
      echo "Production rollout observation window: ${PROD_ROLLOUT_WINDOW_MINUTES} minutes"
      make infra-deploy-prod-ci
      make spa-push ENV=prod
  environment:
    name: prod
    deployment_tier: production
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *deployable_changes
      when: manual

prod-rollout-window:
  stage: deploy-prod
  image: alpine:3.21
  needs: ["deploy-prod"]
  script:
    - echo "Production rollout window complete after ${PROD_ROLLOUT_WINDOW_MINUTES} minutes."
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *deployable_changes
      when: delayed
      start_in: 15 minutes
