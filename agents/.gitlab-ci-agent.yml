# agents/.gitlab-ci-agent.yml
#
# Agent-specific pipeline for packaging, testing, and deploying Bedrock AgentCore agents.
# This file is intended to be triggered as a child pipeline from the root .gitlab-ci.yml.
#
# ADRs: ADR-005 (Declared Invocation Mode), ADR-008 (ZIP Deployment)
# Task: TASK-039

workflow:
  rules:
    - if: $AGENT_NAME == null
      when: never
    - when: always

stages:
  - validate
  - test
  - push-dev
  - promote-staging
  - promote-prod

variables:
  AGENT_PATH: "agents/$AGENT_NAME"
  AGENT_PIPELINE_MODE: "validate"
  AWS_DEFAULT_REGION: "eu-west-2"
  AWS_REGION: "eu-west-2"
  GITLAB_PROTECTED_ENVIRONMENT_NAME: "prod"
  GITLAB_PROTECTED_ENV_REQUIRED_APPROVALS: "2"
  # These role ARNs should be set as GitLab CI/CD variables (from IdentityStack outputs)
  # PLATFORM_PIPELINE_VALIDATE_ROLE_ARN
  # PLATFORM_PIPELINE_DEPLOY_DEV_ROLE_ARN
  # PLATFORM_PIPELINE_DEPLOY_STAGING_ROLE_ARN
  # PLATFORM_PIPELINE_DEPLOY_PROD_ROLE_ARN

default:
  image: python:3.12-slim
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com

.agent-base:
  interruptible: true
  before_script:
    - apt-get update && apt-get install -y curl make git libmagic1
    - curl -Ls https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - uv sync
    - pip install awscli --quiet

.agent-aws-auth-base:
  extends: .agent-base
  before_script:
    - !reference [.agent-base, before_script]
    - |
      if [ -z "${ROLE_ARN:-}" ]; then
        echo "ERROR: agent pipeline AWS role ARN not set."
        echo "Set the required PLATFORM_PIPELINE_*_ROLE_ARN variable."
        exit 1
      fi
      if [ -z "${GITLAB_OIDC_TOKEN:-}" ]; then
        echo "ERROR: GITLAB_OIDC_TOKEN not issued for this agent job."
        echo "Ensure the job inherits default id_tokens syntax."
        exit 1
      fi
      KST=($(aws sts assume-role-with-web-identity \
        --role-arn ${ROLE_ARN} \
        --role-session-name "GitLabAgentPipeline-${AGENT_NAME}" \
        --web-identity-token ${GITLAB_OIDC_TOKEN} \
        --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
        --output text))
      if [ -z "${KST[0]}" ]; then echo "ERROR: STS AssumeRole failed"; exit 1; fi
      export AWS_ACCESS_KEY_ID=${KST[0]}
      export AWS_SECRET_ACCESS_KEY=${KST[1]}
      export AWS_SESSION_TOKEN=${KST[2]}

# ---------------------------------------------------------------------------
# Stage: validate
# ---------------------------------------------------------------------------
validate:
  extends: .agent-aws-auth-base
  stage: validate
  variables:
    ROLE_ARN: $PLATFORM_PIPELINE_VALIDATE_ROLE_ARN
  script:
    - uv run ruff check $AGENT_PATH
    - make validate-agent-manifest AGENT=$AGENT_NAME
    - uv run detect-secrets --baseline .secrets.baseline
  rules:
    - if: $AGENT_PIPELINE_MODE == "validate"
    - if: $AGENT_PIPELINE_MODE == "deploy-dev"
    - if: $AGENT_PIPELINE_MODE == "promote-staging"
    - if: $AGENT_PIPELINE_MODE == "promote-prod"

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------
test:
  extends: .agent-base
  stage: test
  script:
    - make test-agent AGENT=$AGENT_NAME
  rules:
    - if: $AGENT_PIPELINE_MODE == "validate"
    - if: $AGENT_PIPELINE_MODE == "deploy-dev"
    - if: $AGENT_PIPELINE_MODE == "promote-staging"
    - if: $AGENT_PIPELINE_MODE == "promote-prod"

# ---------------------------------------------------------------------------
# Stage: push-dev
# ---------------------------------------------------------------------------
push-dev:
  extends: .agent-aws-auth-base
  stage: push-dev
  variables:
    ROLE_ARN: $PLATFORM_PIPELINE_DEPLOY_DEV_ROLE_ARN
  script:
    - make agent-push AGENT=$AGENT_NAME ENV=dev
  environment:
    name: dev
    deployment_tier: development
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $AGENT_PIPELINE_MODE == "deploy-dev"

# ---------------------------------------------------------------------------
# Stage: promote-staging
# ---------------------------------------------------------------------------
promote-staging:
  extends: .agent-aws-auth-base
  stage: promote-staging
  variables:
    ROLE_ARN: $PLATFORM_PIPELINE_DEPLOY_STAGING_ROLE_ARN
  script:
    - make agent-evaluate AGENT=$AGENT_NAME ENV=staging
    - make agent-push AGENT=$AGENT_NAME ENV=staging
  environment:
    name: staging
    deployment_tier: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $AGENT_PIPELINE_MODE == "promote-staging"
      when: manual

# ---------------------------------------------------------------------------
# Stage: promote-prod
# ---------------------------------------------------------------------------
promote-prod:
  extends: .agent-aws-auth-base
  stage: promote-prod
  variables:
    ROLE_ARN: $PLATFORM_PIPELINE_DEPLOY_PROD_ROLE_ARN
  script:
    - |
      uv run python scripts/check_gitlab_protected_environment.py \
        --environment "${GITLAB_PROTECTED_ENVIRONMENT_NAME}" \
        --min-approvals "${GITLAB_PROTECTED_ENV_REQUIRED_APPROVALS}"
    - make agent-push AGENT=$AGENT_NAME ENV=prod
  environment:
    name: prod
    deployment_tier: production
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $AGENT_PIPELINE_MODE == "promote-prod"
      when: manual
      allow_failure: false
